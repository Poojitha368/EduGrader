{% extends 'base.html' %}

{% block title %}
Grading Page
{% endblock title %}

{% block body %}
<div class="container">
    <form action="/grading" method="post">
        <h1 class="text-center mt-5">EduGrader</h1>
        <p><b>Enter your question here!!</b></p>
        <div class="form-floating mt-2 mb-2">
            <textarea class="form-control border border-dark" placeholder="Enter your question here to analyze..." id="floatingTextarea1" style="height: 100px" name="question"></textarea>
        </div>
        <p><b>Enter your answer here!!</b></p>
        <div class="form-floating mt-2 ">
            <textarea class="form-control border border-dark" placeholder="Enter your answer here to analyze..." id="floatingTextarea2" style="height: 250px" name="answer"></textarea>
        </div>
        <div class="d-flex justify-content-center mt-4">
            <button type="submit" class="btn btn-primary">Analyze</button>
        </div>
    </form>
</div>
{% endblock body %}
