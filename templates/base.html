<!doctype html>
<html lang="en">

<head>

  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    {% block title %}
      Home
    {% endblock title %}
  </title>

  <link rel="stylesheet" href="../static/style.css">


  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdn.datatables.net/2.1.3/css/dataTables.dataTables.min.css" rel="stylesheet">

   
  <!-- <link rel="stylesheet" href="style.css"> -->
</head>

<body>
  <div class="container-fluid">
    <nav class="navbar navbar-expand-lg navbar-light bg-danger">
      <div class="container-fluid">
        <a class="navbar-brand" href="/"> <img src="{{ url_for('static', filename='/images/logo2.png') }}" alt="bloodaid logo" height="32px" width="150px"> </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            {% if not session.username %}
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/login">Login</a>
            </li>
            {% endif %}

            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/donor_form">History</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/patient_form">Subscibe</a>
            </li>

            {% endif %}

            {% if session.username %}
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/logout">logout</a>
            </li>
            {% endif %}
          </ul>

        </div>
      </div>
    </nav>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.datatables.net/2.1.3/js/dataTables.min.js"></script>
    <script type="text/javascript">
      // A $( document ).ready() block.
        $( document ).ready(function() {
          let table = new DataTable('#donationRequestTable');
            console.log( "ready!" );
        });
     
  </script>

  {% block body %}

  {% endblock body %}
</body>

</html>
