{% extends 'base.html' %}

{% block title %}
Register Page
{% endblock title %}

{% block body %}

<div class="container justify-content-center align-items-center min-vh-100 mt-5 col-lg-3">
    <form class="row g-3" action="/register" method="post">
        <div class="col-md-6">
          <label for="inputEmail4" class="form-label">Username</label>
          <input type="text" class="form-control" id="inputEmail4" name="Username">
        </div>
        <div class="col-md-6">
            <label for="inputEmail4" class="form-label">Email</label>
            <input type="text" class="form-control" id="inputEmail4" name="Username">
          </div>
        <div class="col-md-6">
          <label for="inputPassword4" class="form-label">Password</label>
          <input type="password" class="form-control" id="inputPassword4" name="password">
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary bg-danger">Register</button>
          </div>
          
      </form>
</div>

{% endblock body %}
